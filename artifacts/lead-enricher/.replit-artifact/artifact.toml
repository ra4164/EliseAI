kind = "web"
previewPath = "/"
title = "RMA Lead Enricher"
version = "1.0.0"
id = "artifacts/lead-enricher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20968

[services.development]
run = "pnpm --filter @workspace/lead-enricher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lead-enricher", "run", "build" ]
publicDir = "artifacts/lead-enricher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20968"
BASE_PATH = "/"
