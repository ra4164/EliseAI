openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RMA Lead Enrichment API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead management and enrichment
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      description: Returns all leads (enriched and pending) sorted by most recent first
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
    post:
      operationId: createLeads
      tags: [leads]
      summary: Create leads
      description: Add new lead rows. Exact duplicates (same email) are skipped. Same-address conflicts are returned for user resolution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leads:
                  type: array
                  items:
                    $ref: "#/components/schemas/LeadInput"
                batchId:
                  type: string
                  description: Optional batch identifier shared by all leads uploaded together (e.g. via CSV upload).
                batchLabel:
                  type: string
                  description: Optional human-readable label for the batch (e.g. file name).
              required: [leads]
      responses:
        "200":
          description: Created leads with conflict info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLeadsResult"
    delete:
      operationId: deleteAllLeads
      tags: [leads]
      summary: Delete all leads
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /leads/seed:
    post:
      operationId: seedSampleLeads
      tags: [leads]
      summary: Load a curated set of sample leads
      description: Replaces all leads with a curated sample set covering several U.S. cities and property managers.
      responses:
        "200":
          description: Seeded sample leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"

  /leads/enrich-all:
    post:
      operationId: enrichAllPendingLeads
      tags: [leads]
      summary: Run enrichment on every pending lead
      description: Triggers enrichment for all leads currently in 'pending' state. This is the main "Run Daily" button.
      responses:
        "200":
          description: Enrichment completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichBatchResult"

  /leads/{leadId}:
    parameters:
      - name: leadId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead by id
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead's mutable fields (notes, outreachSentAt)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /leads/{leadId}/contacts:
    parameters:
      - name: leadId
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: addContactToLead
      tags: [leads]
      summary: Add an additional contact to an existing lead
      description: Used to merge a same-address duplicate — adds the incoming contact to the existing lead's additionalContacts list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdditionalContact"
      responses:
        "200":
          description: Updated lead with new contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateAdditionalContact
      tags: [leads]
      summary: Update an additional contact's outreachSentAt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                outreachSentAt:
                  type: [string, "null"]
              required: [email]
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{leadId}/enrich:
    parameters:
      - name: leadId
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: enrichLead
      tags: [leads]
      summary: Enrich a single lead
      description: Re-runs all data sources and AI generation for the lead.
      responses:
        "200":
          description: Enriched lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /schedule:
    get:
      operationId: getScheduleStatus
      tags: [leads]
      summary: Get the auto-enrichment schedule status
      description: Returns the cron schedule, next run time, last run stats, and whether a run is currently in progress.
      responses:
        "200":
          description: Schedule status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleStatus"

  /schedule/trigger:
    post:
      operationId: triggerEnrichment
      tags: [leads]
      summary: Manually trigger enrichment of all pending leads
      description: Runs enrichment immediately (same logic as the 9 AM cron) and returns batch results plus updated schedule status.
      responses:
        "200":
          description: Trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerResult"

  /leads/stats:
    get:
      operationId: getLeadStats
      tags: [leads]
      summary: Aggregate stats across the lead pipeline
      description: Dashboard summary showing total leads, average score, breakdown by tier, and most recent activity.
      responses:
        "200":
          description: Pipeline statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    LeadInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        propertyAddress:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
      required: [name, email, company, propertyAddress, city, state, country]

    NewsArticle:
      type: object
      properties:
        title:
          type: string
        source:
          type: string
        url:
          type: string
        publishedAt:
          type: string
        description:
          type: [string, "null"]
      required: [title, source, url, publishedAt, description]

    WalkScoreData:
      type: object
      properties:
        walk:
          type: [number, "null"]
        walkDescription:
          type: [string, "null"]
        transit:
          type: [number, "null"]
        transitDescription:
          type: [string, "null"]
        bike:
          type: [number, "null"]
        bikeDescription:
          type: [string, "null"]
      required: [walk, walkDescription, transit, transitDescription, bike, bikeDescription]

    CensusData:
      type: object
      properties:
        medianHouseholdIncome:
          type: [number, "null"]
        medianGrossRent:
          type: [number, "null"]
        medianHomeValue:
          type: [number, "null"]
        totalPopulation:
          type: [number, "null"]
        renterOccupiedPct:
          type: [number, "null"]
        bachelorsOrHigherPct:
          type: [number, "null"]
        placeName:
          type: [string, "null"]
      required: [medianHouseholdIncome, medianGrossRent, medianHomeValue, totalPopulation, renterOccupiedPct, bachelorsOrHigherPct, placeName]

    OutreachEmail:
      type: object
      properties:
        subject:
          type: string
        body:
          type: string
      required: [subject, body]

    LeadEnrichment:
      type: object
      properties:
        score:
          type: number
          description: 0-100 lead score
        tier:
          type: string
          enum: [hot, warm, cold]
        scoreReasons:
          type: array
          items:
            type: string
        salesInsights:
          type: array
          items:
            type: string
        talkingPoints:
          type: array
          items:
            type: string
        outreachEmail:
          $ref: "#/components/schemas/OutreachEmail"
        walkScore:
          $ref: "#/components/schemas/WalkScoreData"
        census:
          $ref: "#/components/schemas/CensusData"
        news:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        enrichedAt:
          type: string
        warnings:
          type: array
          items:
            type: string
      required: [score, tier, scoreReasons, salesInsights, talkingPoints, outreachEmail, walkScore, census, news, enrichedAt, warnings]

    AdditionalContact:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        outreachSentAt:
          type: [string, "null"]
          description: ISO timestamp when outreach was sent to this contact.
      required: [name, email, outreachSentAt]

    DuplicateConflict:
      type: object
      description: An incoming lead that shares a property address with an existing lead but has a different contact.
      properties:
        incomingName:
          type: string
        incomingEmail:
          type: string
        existingLeadId:
          type: string
        existingLeadName:
          type: string
        existingLeadEmail:
          type: string
        propertyAddress:
          type: string
      required: [incomingName, incomingEmail, existingLeadId, existingLeadName, existingLeadEmail, propertyAddress]

    CreateLeadsResult:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
          description: Leads that were successfully created.
        skipped:
          type: array
          description: Leads skipped because they are exact duplicates (same email already in store).
          items:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
            required: [name, email]
        conflicts:
          type: array
          description: Leads that share a property address with an existing lead but have a different contact — user must decide whether to merge.
          items:
            $ref: "#/components/schemas/DuplicateConflict"
      required: [leads, skipped, conflicts]

    Lead:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        company:
          type: string
        propertyAddress:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        status:
          type: string
          enum: [pending, enriching, enriched, failed]
        createdAt:
          type: string
        enrichment:
          oneOf:
            - $ref: "#/components/schemas/LeadEnrichment"
            - type: "null"
        errorMessage:
          type: [string, "null"]
        batchId:
          type: [string, "null"]
          description: Identifier shared by all leads uploaded in the same batch (CSV upload, bulk paste). Null for single leads.
        batchLabel:
          type: [string, "null"]
          description: Human-readable label for the batch (e.g. file name or timestamp).
        notes:
          type: [string, "null"]
          description: Rep-entered notes or custom context about this lead.
        outreachSentAt:
          type: [string, "null"]
          description: ISO timestamp when the outreach email was approved and sent by a rep (primary contact).
        additionalContacts:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalContact"
          description: Additional contacts found at the same property address via duplicate detection.
      required: [id, name, email, company, propertyAddress, city, state, country, status, createdAt, batchId, batchLabel, notes, outreachSentAt, additionalContacts]

    LeadList:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
      required: [leads]

    EnrichBatchResult:
      type: object
      properties:
        processed:
          type: number
        succeeded:
          type: number
        failed:
          type: number
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
      required: [processed, succeeded, failed, leads]

    UpdateLeadBody:
      type: object
      properties:
        notes:
          type: string
          description: Rep notes / custom context for this lead.
        outreachSentAt:
          type: [string, "null"]
          description: ISO timestamp when outreach was sent. Pass null to un-mark.

    ScheduleStatus:
      type: object
      properties:
        cronExpression:
          type: string
        friendlySchedule:
          type: string
        nextRunAt:
          type: [string, "null"]
        lastRunAt:
          type: [string, "null"]
        lastRunSucceeded:
          type: [number, "null"]
        lastRunFailed:
          type: [number, "null"]
        isRunning:
          type: boolean
      required: [cronExpression, friendlySchedule, nextRunAt, lastRunAt, lastRunSucceeded, lastRunFailed, isRunning]

    TriggerResult:
      type: object
      properties:
        processed:
          type: number
        succeeded:
          type: number
        failed:
          type: number
        schedule:
          $ref: "#/components/schemas/ScheduleStatus"
      required: [processed, succeeded, failed, schedule]

    LeadStats:
      type: object
      properties:
        total:
          type: number
        enrichedCount:
          type: number
        pendingCount:
          type: number
        averageScore:
          type: number
        hotCount:
          type: number
        warmCount:
          type: number
        coldCount:
          type: number
        topLeads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        recentlyEnriched:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        scoreDistribution:
          type: array
          items:
            type: object
            properties:
              bucket:
                type: string
              count:
                type: number
            required: [bucket, count]
      required: [total, enrichedCount, pendingCount, averageScore, hotCount, warmCount, coldCount, topLeads, recentlyEnriched, scoreDistribution]
